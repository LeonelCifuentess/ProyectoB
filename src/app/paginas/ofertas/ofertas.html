<div class="container py-4">
  <div class="row g-4">

    @for (p of ofertas; track p.id) {
      @if (p.disponibilidad) {

        <div class="col-md-4">
          <div class="card auto-card h-100 shadow-lg border-0">

            <img
              [src]="'assets/' + p.img"
              class="card-img-top auto-img"
              [alt]="p.marca">

            <div class="card-body d-flex flex-column">

              <h4 class="card-title fw-bold text-dark">
                {{ p.marca }}
              </h4>

              <p class="text-muted mb-2">
                {{ p.modelo }}
              </p>

              <ul class="list-unstyled flex-grow-1">
                <li>
                  <strong>Año:</strong> {{ p.anio }}
                </li>

                <li>
                  <strong>Color:</strong> {{ p.color }}
                </li>
              </ul>

              <button class="btn btn-dark w-100 mt-3">
                Ver detalles
              </button>

            </div>
          </div>
        </div>

      }
    }

  </div>
</div>
