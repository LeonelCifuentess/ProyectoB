<div class="register-page">

  <div class="register-card">

    <div class="brand">
      <h1>Federic Wheels</h1>
      <p>Creá tu cuenta para comprar</p>
    </div>

    <form>

      <div class="input-box">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre">
      </div>

      <div class="input-box">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="ejemplo@gmail.com">
      </div>

      <div class="input-box">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="********">
      </div>

      <div class="input-box">
        <label for="confirmar">Confirmar contraseña</label>
        <input type="password" id="confirmar" name="confirmar" placeholder="********">
      </div>

      <button type="submit" class="register-btn">
        Registrarse
      </button>

      <div class="login-text">
        ¿Ya tenés cuenta?
        <a routerLink="/inicio-sesion">Iniciar sesión</a>
      </div>

    </form>

  </div>

</div>
