
<div class="register-page">

  <div class="register-card">

    <div class="brand">
      <h1>Federic Wheels</h1>
      <p>Creá tu cuenta para comprar</p>
    </div>

    <form>

      <div class="input-box">
        <label>Nombre completo</label>
        <input
          type="text"
          placeholder=" "
        >
      </div>

      <div class="input-box">
        <label>Email</label>
        <input
          type="email"
          placeholder="ejemplo@gmail.com"
        >
      </div>

      <div class="input-box">
        <label>Contraseña</label>
        <input
          type="password"
          placeholder="********"
        >
      </div>

      <div class="input-box">
        <label>Confirmar contraseña</label>
        <input
          type="password"
          placeholder="********"
        >
      </div>

    

      <button type="submit" class="register-btn">
        Registrarse
      </button>

      <div class="login-text">
        ¿Ya tenés cuenta?
        <a href="#">Iniciar sesión</a>
      </div>

    </form>

  </div>

</div>
